<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 420" role="img" aria-labelledby="fbg-title-s fbg-desc-s">
  <title id="fbg-title-s">FormBridge GP stacked logo</title>
  <desc id="fbg-desc-s">Stacked FormBridge GP logo with two connected forms and medical cross cutout.</desc>
  <defs>
    <linearGradient id="fbg-bridge-gradient-s" x1="12" y1="10" x2="108" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B5FFF"/>
      <stop offset="1" stop-color="#15A37D"/>
    </linearGradient>
    <mask id="fbg-cross-cutout-s" maskUnits="userSpaceOnUse" x="0" y="0" width="120" height="120">
      <rect x="0" y="0" width="120" height="120" fill="#fff"/>
      <rect x="55" y="45" width="10" height="30" rx="2" fill="#000"/>
      <rect x="45" y="55" width="30" height="10" rx="2" fill="#000"/>
    </mask>
  </defs>

  <g transform="translate(120 44)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round" mask="url(#fbg-cross-cutout-s)">
      <rect x="8" y="12" width="42" height="58" rx="8" stroke="#0B5FFF" stroke-width="5"/>
      <rect x="70" y="12" width="42" height="58" rx="8" stroke="#15A37D" stroke-width="5"/>

      <path d="M18 28h20M18 38h16M18 48h18" stroke="#0B5FFF" stroke-width="3" opacity="0.7"/>
      <path d="M80 28h20M80 38h16M80 48h18" stroke="#15A37D" stroke-width="3" opacity="0.7"/>

      <path d="M24 80C38 62 82 62 96 80" stroke="url(#fbg-bridge-gradient-s)" stroke-width="8"/>
    </g>
  </g>

  <text x="180" y="250" text-anchor="middle" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="700" fill="#1F2937">FormBridge</text>
  <rect x="145" y="276" width="70" height="38" rx="19" fill="#15A37D"/>
  <text x="180" y="301" text-anchor="middle" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">GP</text>
</svg>
